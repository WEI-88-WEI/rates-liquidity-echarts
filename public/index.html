<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rates & Liquidity Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    body { font-family: Inter, system-ui, sans-serif; margin: 0; background: #0b1020; color: #e6edf3; }
    .wrap { max-width: 1400px; margin: 0 auto; padding: 24px; }
    h1 { margin: 0 0 8px; }
    p { color: #9fb0c3; }
    .card { background: #121a2b; border: 1px solid #22304a; border-radius: 16px; padding: 14px; }
    .summary { margin-bottom: 16px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .chart-card { display: flex; flex-direction: column; gap: 10px; }
    .chart-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .chart-title { font-size: 15px; font-weight: 700; color: #e6edf3; }
    .chart-sub { font-size: 12px; color: #90a4b8; margin-top: 4px; }
    .source { font-size: 11px; color: #8cc8ff; white-space: nowrap; }
    .chart { width: 100%; height: 340px; }
    .small { font-size: 12px; color: #7f91a6; }
    .warn { color: #ffcf85; }
    a { color: #8cc8ff; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Rates & Liquidity Dashboard</h1>
    <p>只保留当前要看的四条主线：<strong>30Y swap spread</strong>、<strong>10Y swap spread</strong>、<strong>SOFR / TGCR / repo 波动</strong>、<strong>长端 bid-ask / market depth 代理</strong>。</p>

    <div id="status" class="card summary small">Loading…</div>

    <div class="grid" id="grid"></div>
  </div>
  <script>
    const chartDefs = [
      {
        id: 'swap30',
        title: '30Y Swap Spread',
        subtitle: '当前仍为占位状态，等待稳定公开的 30Y swap rate 源接入',
        source: 'Wanted source: public 30Y swap rate + U.S. Treasury 30Y',
        kind: 'placeholder'
      },
      {
        id: 'swap10',
        title: '10Y Swap Spread',
        subtitle: '当前仍为占位状态，等待稳定公开的 10Y swap rate 源接入',
        source: 'Wanted source: public 10Y swap rate + U.S. Treasury 10Y',
        kind: 'placeholder'
      },
      {
        id: 'vol',
        title: 'SOFR / TGCR / Repo',
        subtitle: '直接展示 SOFR / TGCR / repo 相关利率，不再额外计算波动',
        source: 'Source: New York Fed reference rates + OFR repo dataset',
        kind: 'chart',
        series: [
          ['SOFR', 'SOFR'],
          ['TGCR', 'TGCR'],
          ['REPO_GCF_AR_T', 'Repo GCF Treasury Rate'],
          ['REPO_DVP_AR_OO', 'Repo DVP O/N Rate'],
        ]
      },
      {
        id: 'liq',
        title: 'Long-End Liquidity Proxy',
        subtitle: '暂以 FRBNY 2023 long-end official flow proxy 代替真实 bid-ask / depth',
        source: 'Source: FRBNY historical Treasury operation xls files (2023 only)',
        kind: 'chart',
        series: [
          ['FRBNY_LONGEND_GROSS_2023', 'Long-end Gross'],
          ['FRBNY_LONGEND_NET_2023', 'Long-end Net'],
          ['FRBNY_LONGEND_PURCHASES_2023', 'Long-end Purchases'],
          ['FRBNY_LONGEND_SALES_2023', 'Long-end Sales'],
        ]
      }
    ];

    function lineOption(title, seriesDefs) {
      return {
        animation: false,
        tooltip: { trigger: 'axis' },
        legend: { top: 0, textStyle: { color: '#c8d1dc', fontSize: 11 } },
        grid: { left: 52, right: 20, top: 40, bottom: 40 },
        xAxis: { type: 'time', axisLabel: { color: '#9fb0c3' }, axisLine: { lineStyle: { color: '#31415f' } } },
        yAxis: { type: 'value', axisLabel: { color: '#9fb0c3' }, axisLine: { lineStyle: { color: '#31415f' } }, splitLine: { lineStyle: { color: '#22304a' } } },
        series: seriesDefs.map(s => ({ name: s.name, type: 'line', showSymbol: false, lineStyle: { width: 2 }, data: s.data }))
      }
    }

    function toPairs(arr) { return (arr || []).map(x => [x.date, x.value]); }
    function cutoffDateOneYear() {
      const latest = Date.parse('2026-03-26T00:00:00Z');
      const d = new Date(latest);
      d.setUTCFullYear(d.getUTCFullYear() - 1);
      return d.toISOString().slice(0, 10);
    }
    function filterLastYear(arr) {
      const cutoff = cutoffDateOneYear();
      return (arr || []).filter(x => x.date >= cutoff);
    }

    async function loadData() {
      const r = await fetch('./data/combined.json', { cache: 'no-store' });
      if (!r.ok) throw new Error('data load failed: ' + r.status);
      return await r.json();
    }

    function buildGrid() {
      const grid = document.getElementById('grid');
      grid.innerHTML = chartDefs.map(def => `
        <div class="card chart-card">
          <div class="chart-head">
            <div>
              <div class="chart-title">${def.title}</div>
              <div class="chart-sub">${def.subtitle}</div>
            </div>
            <div class="source">${def.source}</div>
          </div>
          <div id="${def.id}" class="chart"></div>
        </div>
      `).join('');
    }

    function render(data) {
      document.getElementById('status').innerHTML = '<span class="warn">已删除其他冗余图，只保留你指定的四项。SOFR / TGCR / repo 这一项现改为直接展示原始利率序列，不再额外计算波动。10Y/30Y swap spread 还在等稳定公开 swap rate 数据源，所以目前是占位卡片。</span>'; 
      chartDefs.forEach(def => {
        const chart = echarts.init(document.getElementById(def.id));
        if (def.kind === 'placeholder') {
          chart.setOption({
            graphic: [{
              type: 'text', left: 'center', top: 'middle',
              style: {
                text: def.title + '\n\nWaiting for stable public swap-rate source',
                fill: '#9fb0c3',
                fontSize: 18,
                textAlign: 'center'
              }
            }]
          });
        } else {
          const series = def.series.map(([key, label]) => ({ name: label, data: toPairs(filterLastYear(data[key])) }));
          chart.setOption(lineOption(def.title, series));
        }
        window.addEventListener('resize', () => chart.resize());
      });
    }

    buildGrid();
    loadData().then(render).catch(err => {
      document.getElementById('status').textContent = 'Load failed: ' + err;
    });
  </script>
</body>
</html>
