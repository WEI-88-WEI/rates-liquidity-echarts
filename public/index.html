<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rates & Liquidity Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    body { font-family: Inter, system-ui, sans-serif; margin: 0; background: #0b1020; color: #e6edf3; }
    .wrap { max-width: 1400px; margin: 0 auto; padding: 24px; }
    h1 { margin: 0 0 8px; }
    p { color: #9fb0c3; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .card { background: #121a2b; border: 1px solid #22304a; border-radius: 16px; padding: 12px; }
    .chart { width: 100%; height: 360px; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Rates & Liquidity Dashboard</h1>
    <p>Public-data first. Includes SOFR / TGCR / BGCR, latest reference-rate volumes, Treasury 10Y/30Y, and derived volatility proxies.</p>
    <div class="grid">
      <div class="card"><div id="c1" class="chart"></div></div>
      <div class="card"><div id="c2" class="chart"></div></div>
      <div class="card"><div id="c3" class="chart"></div></div>
      <div class="card"><div id="c4" class="chart"></div></div>
      <div class="card"><div id="c5" class="chart"></div></div>
      <div class="card"><div id="c6" class="chart"></div></div>
    </div>
  </div>
  <script>
    function lineOption(title, seriesDefs) {
      return {
        title: { text: title, textStyle: { color: '#e6edf3' } },
        tooltip: { trigger: 'axis' },
        legend: { textStyle: { color: '#c8d1dc' } },
        grid: { left: 50, right: 20, top: 50, bottom: 40 },
        xAxis: { type: 'time', axisLabel: { color: '#9fb0c3' } },
        yAxis: { type: 'value', axisLabel: { color: '#9fb0c3' }, splitLine: { lineStyle: { color: '#22304a' } } },
        series: seriesDefs.map(s => ({ name: s.name, type: 'line', showSymbol: false, data: s.data }))
      }
    }

    fetch('../data/combined.json').then(r => r.json()).then(data => {
      const toPairs = arr => arr.map(x => [x.date, x.value]);
      const charts = [
        ['c1', 'SOFR / TGCR / BGCR', [
          { name: 'SOFR', data: toPairs(data.SOFR || []) },
          { name: 'TGCR', data: toPairs(data.TGCR || []) },
          { name: 'BGCR', data: toPairs(data.BGCR || []) },
        ]],
        ['c2', 'TGCR Volume', [
          { name: 'SOFR Volume (latest point)', data: toPairs(data.SOFRVOLUME || []) },
          { name: 'TGCR Volume (latest point)', data: toPairs(data.TGCRVOLUME || []) },
          { name: 'BGCR Volume (latest point)', data: toPairs(data.BGCRVOLUME || []) },
        ]],
        ['c3', '10Y / 30Y Treasury', [
          { name: 'DGS10', data: toPairs(data.DGS10 || []) },
          { name: 'DGS30', data: toPairs(data.DGS30 || []) },
        ]],
        ['c4', '20d Realized Vol (level changes)', [
          { name: 'SOFR 20d vol', data: toPairs(data.SOFR_20d_vol || []) },
          { name: 'TGCR 20d vol', data: toPairs(data.TGCR_20d_vol || []) },
          { name: 'BGCR 20d vol', data: toPairs(data.BGCR_20d_vol || []) },
        ]],
        ['c5', 'Proxy Spread vs Treasury', [
          { name: 'SOFR - DGS10 proxy', data: toPairs(data.SOFR_minus_DGS10_proxy || []) },
          { name: 'SOFR - DGS30 proxy', data: toPairs(data.SOFR_minus_DGS30_proxy || []) },
        ]],
        ['c6', 'Notes', []],
      ];
      charts.forEach(([id, title, series]) => {
        const chart = echarts.init(document.getElementById(id));
        if (series.length) chart.setOption(lineOption(title, series));
        else chart.setOption({
          title: { text: title, textStyle: { color: '#e6edf3' } },
          graphic: [{ type: 'text', left: 'center', top: 'middle', style: { fill: '#9fb0c3', text: 'Next step: wire true 10Y/30Y swap rates and a public long-end liquidity proxy dataset.', fontSize: 18, width: 480, overflow: 'break' } }]
        });
        window.addEventListener('resize', () => chart.resize());
      });
    });
  </script>
</body>
</html>
